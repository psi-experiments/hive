<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fafbfc;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;padding:60px;display:flex;flex-direction:column;align-items:center}
h1{font-size:36px;font-weight:800;letter-spacing:-1px;color:#111827;margin-bottom:8px}
.subtitle{font-size:16px;color:#6b7280;margin-bottom:56px}
svg text{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif}
</style></head><body>
<h1>How Solutions Evolve</h1>
<p class="subtitle">Like a family tree - each attempt branches from the best ideas, and scores improve over time</p>
<svg width="1000" height="520" viewBox="0 0 1000 520">
  <!-- Background grid -->
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ef4444" stop-opacity="0.1"/><stop offset="100%" stop-color="#ef4444" stop-opacity="0"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#22c55e" stop-opacity="0.1"/><stop offset="100%" stop-color="#22c55e" stop-opacity="0"/></linearGradient>
  </defs>

  <!-- Score axis -->
  <line x1="80" y1="60" x2="80" y2="440" stroke="#e5e7eb" stroke-width="1"/>
  <text x="30" y="440" fill="#9ca3af" font-size="12" text-anchor="middle">0%</text>
  <text x="30" y="340" fill="#9ca3af" font-size="12" text-anchor="middle">25%</text>
  <text x="30" y="240" fill="#9ca3af" font-size="12" text-anchor="middle">50%</text>
  <text x="30" y="140" fill="#9ca3af" font-size="12" text-anchor="middle">75%</text>
  <text x="30" y="80" fill="#9ca3af" font-size="12" text-anchor="middle">100%</text>
  <text x="30" y="50" fill="#6b7280" font-size="11" font-weight="600" text-anchor="middle">Score</text>

  <!-- Time axis -->
  <line x1="80" y1="440" x2="950" y2="440" stroke="#e5e7eb" stroke-width="1"/>
  <text x="500" y="480" fill="#6b7280" font-size="12" font-weight="600" text-anchor="middle">Time &rarr;</text>

  <!-- Dashed grid lines -->
  <line x1="80" y1="340" x2="950" y2="340" stroke="#f3f4f6" stroke-width="1" stroke-dasharray="4"/>
  <line x1="80" y1="240" x2="950" y2="240" stroke="#f3f4f6" stroke-width="1" stroke-dasharray="4"/>
  <line x1="80" y1="140" x2="950" y2="140" stroke="#f3f4f6" stroke-width="1" stroke-dasharray="4"/>

  <!-- Edges (connections) -->
  <path d="M160,390 Q240,360 280,280" fill="none" stroke="#f97316" stroke-width="3" opacity="0.4"/>
  <path d="M160,390 Q200,380 240,360" fill="none" stroke="#3b82f6" stroke-width="3" opacity="0.4"/>
  <path d="M280,280 Q360,240 400,220" fill="none" stroke="#f97316" stroke-width="3" opacity="0.4"/>
  <path d="M240,360 Q320,320 360,280" fill="none" stroke="#3b82f6" stroke-width="3" opacity="0.4"/>
  <path d="M400,220 Q500,180 540,170" fill="none" stroke="#f97316" stroke-width="3" opacity="0.4"/>
  <path d="M400,220 Q480,200 520,210" fill="none" stroke="#a855f7" stroke-width="3" opacity="0.4" stroke-dasharray="6,4"/>
  <path d="M540,170 Q640,140 680,120" fill="none" stroke="#f97316" stroke-width="3" opacity="0.4"/>
  <path d="M520,210 Q600,170 640,140" fill="none" stroke="#a855f7" stroke-width="3" opacity="0.4"/>
  <path d="M640,140 Q740,110 780,100" fill="none" stroke="#a855f7" stroke-width="3" opacity="0.4"/>
  <path d="M680,120 Q760,100 800,90" fill="none" stroke="#06b6d4" stroke-width="3" opacity="0.4" stroke-dasharray="6,4"/>

  <!-- Nodes -->
  <!-- Seed -->
  <circle cx="160" cy="390" r="22" fill="#fff" stroke="#9ca3af" stroke-width="3"/>
  <text x="160" y="386" text-anchor="middle" fill="#6b7280" font-size="11" font-weight="700">34%</text>
  <text x="160" y="398" text-anchor="middle" fill="#9ca3af" font-size="9">Seed</text>

  <!-- Ember: 78% -->
  <circle cx="280" cy="280" r="20" fill="#fff7ed" stroke="#f97316" stroke-width="3"/>
  <text x="280" y="276" text-anchor="middle" fill="#c2410c" font-size="11" font-weight="700">78%</text>
  <text x="280" y="288" text-anchor="middle" fill="#f97316" font-size="8">Ember</text>
  <text x="280" y="310" text-anchor="middle" fill="#9ca3af" font-size="10">CoT prompting</text>

  <!-- Atlas: 72% -->
  <circle cx="240" cy="360" r="18" fill="#eff6ff" stroke="#3b82f6" stroke-width="3"/>
  <text x="240" y="356" text-anchor="middle" fill="#1d4ed8" font-size="11" font-weight="700">72%</text>
  <text x="240" y="367" text-anchor="middle" fill="#3b82f6" font-size="8">Atlas</text>

  <!-- Atlas: 80% -->
  <circle cx="360" cy="280" r="18" fill="#eff6ff" stroke="#3b82f6" stroke-width="3"/>
  <text x="360" y="276" text-anchor="middle" fill="#1d4ed8" font-size="11" font-weight="700">80%</text>
  <text x="360" y="287" text-anchor="middle" fill="#3b82f6" font-size="8">Atlas</text>

  <!-- Ember: 85% -->
  <circle cx="400" cy="220" r="20" fill="#fff7ed" stroke="#f97316" stroke-width="3"/>
  <text x="400" y="216" text-anchor="middle" fill="#c2410c" font-size="11" font-weight="700">85%</text>
  <text x="400" y="228" text-anchor="middle" fill="#f97316" font-size="8">Ember</text>
  <text x="400" y="250" text-anchor="middle" fill="#9ca3af" font-size="10">+ few-shot</text>

  <!-- Phoenix: 88% (cross-agent from Ember) -->
  <circle cx="520" cy="210" r="18" fill="#faf5ff" stroke="#a855f7" stroke-width="3"/>
  <text x="520" y="206" text-anchor="middle" fill="#7c3aed" font-size="11" font-weight="700">88%</text>
  <text x="520" y="217" text-anchor="middle" fill="#a855f7" font-size="8">Phoenix</text>

  <!-- Ember: 91% -->
  <circle cx="540" cy="170" r="20" fill="#fff7ed" stroke="#f97316" stroke-width="3"/>
  <text x="540" y="166" text-anchor="middle" fill="#c2410c" font-size="11" font-weight="700">91%</text>
  <text x="540" y="178" text-anchor="middle" fill="#f97316" font-size="8">Ember</text>

  <!-- Phoenix: 93% -->
  <circle cx="640" cy="140" r="20" fill="#faf5ff" stroke="#a855f7" stroke-width="3"/>
  <text x="640" y="136" text-anchor="middle" fill="#7c3aed" font-size="11" font-weight="700">93%</text>
  <text x="640" y="148" text-anchor="middle" fill="#a855f7" font-size="8">Phoenix</text>
  <text x="640" y="170" text-anchor="middle" fill="#9ca3af" font-size="10">+ ensemble</text>

  <!-- Ember: 91% refined -->
  <circle cx="680" cy="120" r="18" fill="#fff7ed" stroke="#f97316" stroke-width="3"/>
  <text x="680" y="116" text-anchor="middle" fill="#c2410c" font-size="11" font-weight="700">91%</text>
  <text x="680" y="127" text-anchor="middle" fill="#f97316" font-size="8">Ember</text>

  <!-- BEST: 96% -->
  <circle cx="800" cy="90" r="26" fill="#f0fdf4" stroke="#16a34a" stroke-width="4"/>
  <text x="800" y="85" text-anchor="middle" fill="#15803d" font-size="14" font-weight="800">96%</text>
  <text x="800" y="98" text-anchor="middle" fill="#22c55e" font-size="9">BEST</text>
  <text x="800" y="126" text-anchor="middle" fill="#16a34a" font-size="11" font-weight="600">Tuned ensemble</text>

  <!-- Annotation -->
  <rect x="700" y="420" width="240" height="60" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="820" y="443" text-anchor="middle" fill="#15803d" font-size="12" font-weight="700">34% to 96%</text>
  <text x="820" y="460" text-anchor="middle" fill="#4b5563" font-size="11">through collaborative evolution</text>

  <!-- Legend -->
  <rect x="100" y="460" width="380" height="40" rx="10" fill="#f9fafb" stroke="#e5e7eb"/>
  <circle cx="124" cy="480" r="6" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="136" y="484" fill="#6b7280" font-size="11">Ember</text>
  <circle cx="194" cy="480" r="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="206" y="484" fill="#6b7280" font-size="11">Atlas</text>
  <circle cx="264" cy="480" r="6" fill="#faf5ff" stroke="#a855f7" stroke-width="2"/>
  <text x="276" y="484" fill="#6b7280" font-size="11">Phoenix</text>
  <line x1="340" y1="477" x2="365" y2="477" stroke="#a855f7" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="372" y="484" fill="#6b7280" font-size="11">Cross-agent build</text>
</svg>
</body></html>
